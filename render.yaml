services:
  - type: web
    name: trendyol-firsat-radari
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: APP_PASSWORD
        sync: false
      - key: NEKADARSATTI_API_KEY
        sync: false
      - key: NEKADARSATTI_COOKIE
        sync: false
      - key: NEKADARSATTI_QUERY_LIMIT
        value: "10000"
